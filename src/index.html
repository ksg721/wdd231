<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="/js/main.js" defer></script>
  </head>

  <body>
    <header>
      <h1>US NATIONAL PARKS</h1>
      <nav>&equiv; MENU</nav>
    </header>
    <main>
      <section id="hero">
        <img
          id="heroImage"
          src="public/images/us-map.png"
          alt="Map of the US"
        />
      </section>
      <section id="parkInfo">
        <h2 id="parkName">Park Name</h2>
        <div>
          <p id="parkType">ParkType</p>
          <p id="parkStates">Park States</p>
        </div>
      </section>
      <section id="parkMenu">
        <ul>
          <li>
            <p>INFO</p>
            <p>
              <svg>
                <use href="/images/sprite.svg#info"></use>
              </svg>
            </p>
          </li>
          <li>
            <p>ALERTS</p>
            <p>
              <svg>
                <use href="/images/sprite.svg#safety-caution-alerts"></use>
              </svg>
            </p>
          </li>
          <li>
            <p>MAPS</p>
            <p>
              <svg>
                <use href="/images/sprite.svg#location_on"></use>
              </svg>
            </p>
          </li>
          <li>
            <p>EVENTS</p>
            <p>
              <svg>
                <use href="/images/sprite.svg#event"></use>
              </svg>
            </p>
          </li>
          <li>
            <p>FEES</p>
            <p>
              <svg>
                <use href="/images/sprite.svg#passes-and-fees"></use>
              </svg>
            </p>
          </li>
        </ul>
      </section>
    </main>
    <footer>
      <p>&copy; 2026 WDD 231 Sample Project</p>
    </footer>
  </body>
</html>
